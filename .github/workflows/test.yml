name: Backend CI
on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Start test environment
        run: |
          docker compose -f docker-compose.test.yml up -d
          echo "Waiting for databases to start..."
          timeout 60 bash -c 'until docker compose -f docker-compose.test.yml exec -T db mysqladmin ping -h localhost --silent; do sleep 2; done'
          sleep 5 # データベースが完全に起動するまで待機
      - name: Build and Run Tests
        run: |
          docker compose -f docker-compose.test.yml run --rm -T test-runner bash -c "
            mkdir -p build && cd build &&
            cmake .. && make -j\$(nproc) &&
            cd .. && ./build/test/playbacq_test
          "
      - name: Tear down environment
        if: always()
        run: docker compose -f docker-compose.test.yml down

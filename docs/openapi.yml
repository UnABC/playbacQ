openapi: 3.1.0
info:
  title: playbacQ
  version: "0.0.1"
  description: "playbacQサーバーのAPIです。"
  contact:
    name: traP
    url: "https://trap.jp/"

servers:
  - url: "http://localhost:8080"
    description: local

paths:
  /api/videos:
    get:
      summary: "動画一覧の取得"
      operationId: getVideos
      parameters:
        - schema:
            type: "string"
          name: "userId"
          in: "query"
          description: "ユーザーIDで動画をフィルタリングします。"
        - schema:
            type: "string"
          name: "search"
          in: "query"
          description: "動画のタイトルや説明で検索します。"
        - schema:
            type: "string"
          name: "tag"
          in: "query"
          description: "動画のタグでフィルタリングします。"
        - schema:
            type: "string"
          name: "sortby"
          in: "query"
          description: "動画の並び順を指定します。"
        - schema:
            type: "integer"
          name: "order"
          in: "query"
          description: "動画の並び順を昇順(1)か降順(0)で指定します。"
      responses:
        "200":
          description: "動画の一覧を取得します。"
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Video"
    post:
      summary: "動画の投稿"
      operationId: createVideo
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                  description: "動画のタイトル"
                description:
                  type: string
                  description: "動画の説明"
      responses:
        "201":
          description: "動画が作成されました。"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Video"
        "400":
          description: "リクエストが不正です。"
        "403":
          description: "アクセスが拒否されました。"
    delete:
      summary: "動画の削除"
      description: "動画とそれに関連するデータ(コメント、タグなど)を削除します。タグそのものは消えません。動画の投稿者のみが削除できます。"
      operationId: deleteVideo
      parameters:
        - name: id
          in: query
          required: true
          schema:
            type: string
          description: "動画のID"
      responses:
        "200":
          description: "動画が削除されました。"
        "403":
          description: "アクセスが拒否されました。"
        "404":
          description: "動画が見つかりませんでした。"

  /api/videos/{id}:
    get:
      summary: "動画の取得"
      operationId: getVideoById
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: "動画のID"
      responses:
        "200":
          description: "動画を返します。"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Video"
        "403":
          description: "アクセスが拒否されました。"
        "404":
          description: "動画が見つかりませんでした。"
  /api/videos/{id}/comments:
    get:
      summary: "動画のコメントの取得"
      operationId: getCommentsByVideoId
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: "動画のID"
      responses:
        "200":
          description: "動画のコメントを返します。"
          content:
            application/json:
              schema:
                type: array
                items:
                  type: array
                  items:
                    $ref: "#/components/schemas/Comment"
    post:
      summary: "動画のコメントの投稿"
      operationId: createComment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: "動画のID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                content:
                  type: string
                  description: "コメントの内容"
                timestamp:
                  type: number
                  format: double
                  description: "コメントの投稿時間"
                command:
                  type: string
                  description: "コメントのコマンド(Json文字列)"
      responses:
        "201":
          description: "コメントが作成されました。"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Comment"
    delete:
      summary: "動画のコメントの削除"
      description: "動画のコメントを削除します。コメントしたユーザーまたは動画の投稿者のみが削除できます。"
      operationId: deleteComment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: "動画のID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                commentId:
                  type: integer
                  description: "削除するコメントのID"
      responses:
        "200":
          description: "コメントが削除されました。"
        "403":
          description: "アクセスが拒否されました。"
        "404":
          description: "動画またはコメントが見つかりませんでした。"
  /api/videos/{id}/progress:
    get:
      summary: "動画のアップロードの進捗の取得"
      operationId: getVideoProgress
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: "動画のID"
      responses:
        "200":
          description: "動画のアップロードの進捗を返します。"
          content:
            application/json:
              schema:
                type: object
                properties:
                  progress:
                    type: number
                    format: int
                    description: "動画のアップロードの進捗(0~100)"
                  status:
                    type: string
                    description: "動画のアップロードの状態(pending, processing, completed, failed)"
        "403":
          description: "アクセスが拒否されました。"
        "404":
          description: "動画が見つかりませんでした。"
  /api/videos/{id}/play:
    get:
      summary: "署名付きurlを含む.m3u8ファイルの取得"
      operationId: getVideoPlayUrl
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: "動画のID"
      responses:
        "200":
          description: "署名付きurlを含む.m3u8ファイルを返します。"
          content:
            application/vnd.apple.mpegurl:
              schema:
                type: string
                description: "署名付きurlを含む.m3u8ファイルの内容"
        "403":
          description: "アクセスが拒否されました。"
        "404":
          description: "動画が見つかりませんでした。"
  /api/videos/{id}/views:
    post:
      summary: "動画の再生回数のインクリメント"
      operationId: incrementVideoViewCount
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: "動画のID"
      responses:
        "200":
          description: "動画の再生回数がインクリメントされました。"
        "403":
          description: "アクセスが拒否されました。"
        "404":
          description: "動画が見つかりませんでした。"
  /api/videos/{id}/thumbnail:
    get:
      summary: "動画のサムネ画像へのリダイレクト"
      operationId: getVideoThumbnail
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: "動画のID"
      responses:
        "302":
          description: "動画のサムネ画像へのリダイレクト"
        "403":
          description: "アクセスが拒否されました。"
        "404":
          description: "動画が見つかりませんでした。"
  /api/videos/{id}/thumbnails/{thumbnailId}:
    get:
      summary: "サムネイル画像へリダイレクト"
      operationId: getVideoThumbnailUrl
      description: "サムネイル画像のURLを返すのではなく、直接サムネイル画像へリダイレクトします。これはWebTTファイル内でのみ使用します。"
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: "動画のID"
        - name: thumbnailId
          in: path
          required: true
          schema:
            type: string
          description: "サムネイルのID"
      responses:
        "302":
          description: "サムネイル画像へのリダイレクト"
        "403":
          description: "アクセスが拒否されました。"
        "404":
          description: "動画またはサムネイルが見つかりませんでした。"
  /api/videos/{id}/vtt:
    get:
      summary: "動画のサムネイルのWebVTTファイルの取得"
      operationId: getVideoThumbnailsVtt
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: "動画のID"
      responses:
        "200":
          description: "動画のサムネイルのWebVTTファイルを返します。"
          content:
            text/vtt:
              schema:
                type: string
                description: "動画のサムネイルのWebVTTファイルの内容"
        "403":
          description: "アクセスが拒否されました。"
        "404":
          description: "動画が見つかりませんでした。"
  /api/videos/{id}/tags:
    get:
      summary: "動画のタグの取得"
      operationId: getVideoTags
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: "動画のID"
      responses:
        "200":
          description: "動画のタグを返します。"
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    tag_id:
                      type: number
                    name:
                      type: string
        "403":
          description: "アクセスが拒否されました。"
        "404":
          description: "動画が見つかりませんでした。"
    post:
      summary: "動画のタグの追加"
      operationId: addVideoTag
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: "動画のID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                tag:
                  type: string
                  description: "追加するタグ"
      responses:
        "200":
          description: "動画のタグが追加されました。"
          content:
            application/json:
              schema:
                type: object
                properties:
                  tag_id:
                    type: number
                  name:
                    type: string
        "403":
          description: "アクセスが拒否されました。"
        "404":
          description: "動画が見つかりませんでした。"
    delete:
      summary: "動画のタグの削除"
      description: "動画からタグを削除します。タグそのものは消えません。"
      operationId: deleteVideoTag
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: "動画のID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                tag_id:
                  type: number
                  description: "削除するタグのid"
      responses:
        "200":
          description: "動画のタグが削除されました。"
        "403":
          description: "アクセスが拒否されました。"
        "404":
          description: "動画またはタグが見つかりませんでした。"
  /api/tag:
    get:
      summary: "タグの検索"
      operationId: searchTags
      parameters:
        - name: query
          in: query
          required: true
          schema:
            type: string
          description: "タグの検索クエリ"
      responses:
        "200":
          description: "タグの検索結果(タグの配列)を返します。"
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    tag_id:
                      type: number
                    name:
                      type: string
        "403":
          description: "アクセスが拒否されました。"
        "404":
          description: "タグが見つかりませんでした。"
    delete:
      summary: "タグの削除"
      description: "タグを完全に削除します。タグが付いている動画からもタグが消えます。"
      operationId: deleteTag
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                tag_id:
                  type: number
                  description: "削除するタグのid"
      responses:
        "200":
          description: "タグが削除されました。"
        "403":
          description: "アクセスが拒否されました。"
        "404":
          description: "タグが見つかりませんでした。"
  /webhooks/minio:
    post:
      summary: "動画アップロードの通知用"
      operationId: minioWebhook
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
  /webhooks/encode_result:
    post:
      summary: "動画エンコードの完了通知用"
      operationId: encodeResultWebhook
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                videoId:
                  type: string
                  description: "動画のID"
                status:
                  type: string
                  description: "エンコードの状態(completed, failed)"
                message:
                  type: string
                  description: "success or error message"
                duration:
                  type: number
                  description: "動画の長さ(秒)"
  /ws/comments:
    get:
      summary: "コメント送受信用WebSocket"
      operationId: connectCommentsWebSocket
      description: |
        リアルタイムでコメントを受信するためのWebSocketエンドポイントです。
        ※このエンドポイントはHTTP GETリクエストからWebSocket(ws:// または wss://)へアップグレードされます。
        コメントの投稿自体は `POST /api/videos/{id}/comments` を使用してください。
      parameters:
        - name: video_id
          in: query
          required: true
          schema:
            type: string
          description: "接続する動画のID"
      responses:
        "101":
          description: "Switching Protocols (WebSocket接続確立)"
        "400":
          description: "video_idが指定されていない等のエラー"

components:
  schemas:
    Video:
      type: object
      properties:
        created_at:
          type: string
          format: date-time
          readOnly: true
          description: "動画の作成日時"
        video_id:
          type: string
          readOnly: true
          description: "動画のID"
        title:
          type: string
          readOnly: true
          description: "動画のタイトル"
        description:
          type: string
          readOnly: true
          description: "動画の説明"
        url:
          type: string
          readOnly: true
          description: "動画の公開用URL"
        thumbnailUrl:
          type: string
          readOnly: true
          description: "動画の公開用サムネイルURL"
        upload_url:
          type: string
          readOnly: true
          description: "動画のアップロード用URL"
        upload_thumbnail_url:
          type: string
          readOnly: true
          description: "動画のサムネイルアップロード用URL"
        viewCount:
          type: integer
          readOnly: true
          description: "動画の再生回数"
        duration:
          type: number
          readOnly: true
          description: "動画の長さ(秒)"
    Comment:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
          description: "コメントのID"
        content:
          type: string
          description: "コメントの内容"
        timestamp:
          type: number
          format: double
          description: "コメントの投稿時間"
        userId:
          type: string
          readOnly: true
          description: "コメントを投稿したユーザーのID"
        command:
          type: string
          readOnly: true
          description: "コメントのコマンド(Json文字列)"
        createdAt:
          type: string
          format: date-time
          readOnly: true
          description: "コメントの作成日時"
